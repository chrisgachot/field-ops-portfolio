ars — streaks and droughts across the whole team at a glance.","Colorblind-safe tiers: A-grade shifts green → blue, and each heatmap cell now shows its tier letter.","History range now defaults to 3M."]},{version:"1.0.0",date:"2026-06-11",time:"10:31 PM ET",title:"Phase 1 launch",notes:["Deployed to the internal dashboard behind Netlify Identity (Google/GitHub sign-in).","Weekly scheduled collection — scores refresh themselves every Sunday night, zero manual effort.","Metronome brand: header mark, favicon, and a social share card in the scoreboard theme.","Version badge with these release notes."]},{version:"0.9.0",date:"2026-06-11",time:"10:07 PM ET",title:"Better measurement",notes:["Follow-Through bucket (completion ratio, cycle time, overdue open tasks) replaces Role-Specific — applies to every member, no N/A.","Data QA: creation credit follows authorship, real @-mention detection, comments count toward Activity, recurring chores de-duplicated, auto-generated monitoring alerts excluded.","Franz joined the cohort (12 property managers); full history re-collected."]},{version:"0.8.0",date:"2026-06-11",time:"5:40 PM ET",title:"Stat-board",notes:["Scoreboard redesign: S–D letter grades, tier-tinted leaderboard rows, radar profiles vs cohort average, verdicts and callouts.","Compare: matchup bars, spider overlay, and a full side-by-side sub-metric spec sheet (up to 4 members).","Date-range selector (1M/3M/6M) drives every stat as period aggregates; adjustable bucket weights; sort or ignore any column."]},{version:"0.7.0",date:"2026-06-11",time:"8:35 AM ET",title:"Foundation",notes:["Five-bucket scoring engine, cohort-relative, with drillable sub-metrics.","Live Asana service-account integration and production Netlify DB.","Six months of weekly history backfilled from real task data."]}];function gC(e){var t,r,n="";if(typeof e=="string"||typeof e=="number")n+=e;else if(typeof e=="object")if(Array.isArray(e)){var a=e.length;for(t=0;t<a;t++)e[t]&&(r=gC(e[t]))&&(n&&(n+="
