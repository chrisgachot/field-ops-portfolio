<style>
  /* Tempo-inspired "arena scoreboard" dark theme: near-black stage with a
     colored glow, condensed italic display type, electric-blue accent. */
  :root {
    --bg: #0c0d11;
    --panel: #15171d;
    --panel-2: #1b1e26;
    --panel-hover: #232732;
    --border: #2b303b;
    --border-soft: #21252e;
    --track: #2f3440;

    --text: #f2f5f9;
    --text-muted: #a5adbb;
    --text-dim: #6d7684;

    --accent: #2aa3e6;
    --accent-soft: rgba(42, 163, 230, 0.13);
    --accent-line: rgba(42, 163, 230, 0.38);

    --green: #2fd6c0;
    --gold: #f5c84a;
    --red: #e8478f;

    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 16px 44px rgba(0,0,0,.4);
    --font-display: 'Barlow Condensed', 'Arial Narrow', -apple-system, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--font-body); color: var(--text);
    background: var(--bg); font-size: 14px; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(120% 70% at 90% -14%, rgba(42,163,230,.18), transparent 55%),
      radial-gradient(90% 60% at 4% 114%, rgba(120,60,200,.10), transparent 60%);
  }

  /* ---- Header ---- */
  header.app {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 22px;
    background: rgba(12,13,17,.82); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .logo-mark { width: 30px; height: 30px; color: var(--accent); flex: none; filter: drop-shadow(0 0 12px var(--accent-line)); }
  .brand { display: flex; flex-direction: column; line-height: 1; }
  .brand h1 {
    margin: 0; font-family: var(--font-display); font-style: italic; font-weight: 800;
    text-transform: uppercase; letter-spacing: .02em; font-size: 26px;
  }
  .brand .subtitle {
    margin-top: 3px; font-family: var(--font-display); text-transform: uppercase;
    letter-spacing: .16em; font-size: 11.5px; color: var(--text-dim);
  }
  .brand .subtitle .crumb { color: var(--accent); font-weight: 800; }
  #tokenWarn {
    margin-left: auto; display: none; align-items: center; gap: 7px;
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    font-size: 12px; color: var(--gold);
    background: rgba(245,200,74,.1); border: 1px solid rgba(245,200,74,.3);
    border-radius: 999px; padding: 5px 13px;
  }

  /* ---- Layout ---- */
  .layout { display: grid; grid-template-columns: minmax(440px, 1fr) minmax(480px, 1fr); height: calc(100vh - 60px); position: relative; z-index: 1; }
  .pane { overflow-y: auto; }
  .pane.form { padding: 20px 22px 28px; border-right: 1px solid var(--border); }
  .pane.preview {
    padding: 26px; display: flex; align-items: flex-start; justify-content: center;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(42,163,230,.08), transparent 60%),
      #08090c;
  }
  .preview-stage { width: 100%; max-width: 720px; height: 100%; }
  iframe#preview {
    display: block; width: 100%; height: 100%; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; box-shadow: var(--shadow);
  }

  /* ---- Cards / panels ---- */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card h2 {
    font-family: var(--font-display); font-size: 15px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-dim); margin: 0 0 14px; font-weight: 700;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  label.field { display: block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .06em; font-size: 11.5px; color: var(--text-dim); margin-bottom: 5px; }

  input[type=text], input[type=date], select, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font: inherit; font-size: 13px; background: var(--panel-2); color: var(--text);
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea { resize: vertical; min-height: 96px; line-height: 1.5; }
  select { -webkit-appearance: none; appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%); background-position: calc(100% - 16px) 16px, calc(100% - 11px) 16px; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 28px; }
  input[type=date] { color-scheme: dark; }

  .row { display: flex; gap: 10px; align-items: center; }

  /* ---- Buttons ---- */
  button {
    font-family: var(--font-display); font-style: italic; font-weight: 800;
    text-transform: uppercase; letter-spacing: .05em; font-size: 15px;
    background: var(--accent); color: #fff; border: 1px solid var(--accent);
    border-radius: 9px; padding: 9px 18px; cursor: pointer;
    transition: all .12s ease;
  }
  button:hover { box-shadow: 0 0 14px rgba(42,163,230,.4); }
  button.ghost { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); font-style: normal; font-weight: 700; }
  button.ghost:hover { color: var(--text); border-color: var(--text-dim); box-shadow: none; }
  button:disabled { opacity: .45; cursor: default; box-shadow: none; }

  .hint { font-size: 12px; color: var(--text-dim); margin-top: 7px; }
  .hint.err { color: var(--red); }
  .status { font-size: 12px; margin-top: 9px; min-height: 16px; color: var(--text-muted); }
  .status.err { color: var(--red); }
  .status.ok { color: var(--green); }

  /* ---- Task rows ---- */
  .grouphdr { font-family: var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin: 16px 0 7px; font-weight: 800; font-style: italic; }
  .task {
    position: relative; border: 1px solid var(--border-soft); border-radius: 9px;
    padding: 9px 11px 9px 13px; margin-bottom: 8px; background: var(--panel-2); overflow: hidden;
    transition: opacity .12s ease, border-color .12s ease;
  }
  .task::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: .55; }
  .task:hover { border-color: var(--border); }
  .task.off { opacity: .42; }
  .task.off::before { background: var(--track); }
  .task .top { display: flex; gap: 9px; align-items: center; }
  .task input.txt { flex: 1; }
  .task input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex: none; cursor: pointer; }
  .task .meta { font-size: 11px; color: var(--text-dim); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .badge {
    display: inline-flex; align-items: center; border-radius: 999px; padding: 2px 9px;
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    font-size: 10.5px; border: 1px solid var(--border); background: var(--panel); color: var(--text-muted);
  }
  .badge.vendor { background: rgba(245,200,74,.1); border-color: rgba(245,200,74,.32); color: var(--gold); }
  .badge.req { background: rgba(47,214,192,.1); border-color: rgba(47,214,192,.32); color: var(--green); }

  select.section { width: auto; min-width: 132px; padding: 6px 26px 6px 9px; font-size: 12px; }

  /* ---- Photos ---- */
  .photo-item { position: relative; display: grid; grid-template-columns: 64px 1fr; gap: 11px; align-items: start; border: 1px solid var(--border-soft); border-radius: 9px; padding: 9px; margin-bottom: 8px; background: var(--panel-2); transition: opacity .12s ease; }
  .photo-item.off { opacity: .42; }
  .photo-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .photo-item .pcontrols { display: flex; flex-direction: column; gap: 7px; }
  .photo-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .checkline { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .05em; font-size: 12px; color: var(--text-muted); }

  /* ---- Actions ---- */
  .actions { position: sticky; bottom: 0; background: linear-gradient(to top, var(--bg) 70%, transparent); padding: 14px 0 4px; display: flex; gap: 12px; align-items: center; }

  /* Scrollbar polish */
  .pane::-webkit-scrollbar { width: 10px; }
  .pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
  .pane::-webkit-scrollbar-thumb:hover { background: var(--track); }

  /* ---- Edit / Preview toggle (mobile only) ---- */
  .view-toggle { display: none; margin-left: auto; gap: 0; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; flex: none; }
  .view-toggle button {
    font-family: var(--font-display); font-weight: 800; font-style: italic; text-transform: uppercase;
    letter-spacing: .05em; font-size: 12px; padding: 7px 15px; border: none; border-radius: 0;
    background: var(--panel-2); color: var(--text-muted); box-shadow: none;
  }
  .view-toggle button:hover { box-shadow: none; }
  .view-toggle button.active { background: var(--accent); color: #fff; }

  /* ---- Responsive: stack to one column on phones/tablets ---- */
  @media (max-width: 860px) {
    header.app { padding: 10px 14px; gap: 10px; }
    .logo-mark { width: 24px; height: 24px; }
    .brand h1 { font-size: 20px; }
    .brand .subtitle { font-size: 10px; letter-spacing: .12em; }
    #tokenWarn { display: none !important; }
    .view-toggle { display: inline-flex; }

    .layout { display: block; height: auto; }
    .pane { overflow-y: visible; }
    .pane.form { padding: 14px 14px 32px; border-right: none; }
    .pane.preview {
      display: none; padding: 14px; overflow: auto;
      align-items: flex-start; justify-content: flex-start;
      height: calc(100dvh - 53px);  /* fill below the sticky header */
    }
    /* The report is a fixed 816px-wide page; the script scales it to fit the
       phone screen and sizes this stage to the scaled box. */
    .preview-stage { width: auto; max-width: none; height: auto; overflow: hidden; }
    iframe#preview { transform-origin: top left; border-radius: 4px; }

    /* Toggle swaps which pane is shown; preview re-renders on switch */
    body.show-preview .pane.form { display: none; }
    body.show-preview .pane.preview { display: flex; }

    /* Single-column form fields */
    .grid2 { grid-template-columns: 1fr; }
    .card { padding: 14px; border-radius: 12px; }

    /* 16px inputs stop iOS from zooming on focus */
    input[type=text], input[type=date], select, textarea { font-size: 16px; }

    /* Task rows: let the controls stack instead of cramping into one line */
    .task .top { flex-wrap: wrap; }
    .task .top select.section { width: 100%; min-width: 0; order: 3; }
    .task .top input.txt { flex: 1 1 100%; order: 2; }

    /* Bigger touch targets for checkboxes */
    .task input[type=checkbox], .photo-item input[type=checkbox] { width: 20px; height: 20px; }

    /* Full-width primary action on the export bar */
    .actions { flex-wrap: wrap; }
    .actions #export { flex: 1 1 100%; padding: 13px; }
  }
</style>

===========\n   LOCKED REPORT TEMPLATE STYLES\n   Single source of truth for report layout. Same CSS drives the\n   live preview and the exported PDF, so output is identical.\n\n   One-page fitting: the report is a fixed 8.5x11in page box. A\n   script measures the content and reduces --fit (vertical spacing)\n   and, only if still needed, --fz (font scale) until everything\n   fits on one page. At --fit:1 / --fz:1 the layout is the original.\n   ============================================================ */\n\n:root {\n  --ink: #1a1a1a;\n  --body: #333333;\n  --label: #9a9a9a;\n  --rule: #dcdcdc;\n  --navy: #344a7c;\n  --mono: \"Roboto Mono\", \"SF Mono\", \"Menlo\", \"Consolas\", monospace;\n  --sans: \"Arial\", \"Helvetica Neue\", \"Helvetica\", sans-serif;\n\n  --fit: 1;  /* vertical-spacing scale, reduced first to fit one page */\n  --img: 1;  /* photo-size scale, reduced next */\n  --fz: 1;   /* font scale, reduced only as a last resort */\n}\n\n@page {\n  size: Letter;\n  margin: 0;  /* the .page element supplies the print margins */\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: #ffffff; }\n\n/* The page box: exactly one Letter page. Print margins live in padding. */\n.page {\n  width: 8.5in;\n  height: 11in;\n  padding: 0.9in 0.85in;\n  margin: 0 auto;\n  background: #ffffff;\n  overflow: hidden;            /* hard one-page guarantee */\n  font-family: var(--sans);\n  color: var(--body);\n  font-size: calc(11.5px * var(--fz));\n  line-height: calc(1.28 + 0.22 * var(--fit));\n}\n\n/* --- Header --- */\n.logo { text-align: center; margin: 0 0 calc(18px * var(--fit)) 0; }\n.logo img { height: calc(78px * var(--fit)); width: auto; }\n\n.title {\n  font-family: var(--mono);\n  font-size: calc(26px * var(--fz));\n  font-weight: 700;\n  color: var(--ink);\n  letter-spacing: 0.5px;\n  margin: 0 0 calc(14px * var(--fit)) 0;\n}\n\n/* --- Metadata block --- */\n.meta {\n  display: grid;\n  grid-template-columns: auto 1fr auto 1fr;\n  gap: calc(6px * var(--fit)) 14px;\n  margin: 0 0 calc(14px * var(--fit)) 0;\n}\n.meta .label { color: var(--label); font-size: calc(10px * var(--fz)); white-space: nowrap; align-self: center; }\n.meta .value { color: var(--ink); font-weight: 700; font-size: calc(11.5px * var(--fz)); align-self: center; }\n\nhr.divider {\n  border: none;\n  border-top: 1px solid var(--rule);\n  margin: calc(14px * var(--fit)) 0 calc(18px * var(--fit)) 0;\n}\n\n/* --- Sections --- */\nh2.section {\n  font-family: var(--mono);\n  font-size: calc(15px * var(--fz));\n  font-weight: 700;\n  color: var(--ink);\n  margin: calc(22px * var(--fit)) 0 calc(8px * var(--fit)) 0;\n  break-after: avoid;\n  page-break-after: avoid;\n}\nsection.block:first-of-type h2.section { margin-top: 0; }\n\n.summary p { margin: 0; }\n\nul.items { margin: 0; padding-left: 20px; }\nul.items li {\n  margin: 0 0 calc(5px * var(--fit)) 0;\n  break-inside: avoid;\n  page-break-inside: avoid;\n}\n\n/* --- Photos --- */\nfigure.photo { margin: calc(12px * var(--fit)) 0 0 0; break-inside: avoid; page-break-inside: avoid; }\nfigure.photo img {\n  display: block;\n  width: 100%;\n  max-height: calc(3.2in * var(--img));\n  object-fit: contain;\n  border: 1px solid #ececec;\n  border-radius: 2px;\n}\nfigure.photo figcaption {\n  text-align: center;\n  font-style: italic;\n  color: var(--label);\n  font-size: calc(10px * var(--fz));\n  margin-top: calc(4px * var(--fit));\n}\n\n.appendix-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: calc(14px * var(--fit));\n  margin-top: calc(4px * var(--fit));\n}\n.appendix-grid figure.photo { margin: 0; }\n.appendix-grid figure.photo img { max-height: calc(2.7in * var(--img)); }\n\n/* --- Footer --- */\n.footer {\n  font-family: var(--mono);\n  text-align: center;\n  color: #777777;\n  font-size: calc(11px * var(--fz));\n  margin-top: calc(34px * var(--fit));\n  padding-top: calc(10px * var(--fit));\n}\n";var SECTION_ORDER=["Network", "Audio Visual", "Cameras", " <body>
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 16px;background:#0d1117;border-bottom:1px solid #2b303b;font-family:'Barlow Condensed',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.1em;position:relative;z-index:20;">
<span style="color:#f5c84a;">&#9679; Demo &middot; fictional data &middot; a sample visit is pre-loaded &middot; Export PDF uses your browser print dialog</span>
<a href="index.html" style="color:#2aa3e6;text-decoration:none;border:1px solid #2b303b;padding:4px 10px;border-radius:4px;">◀ All Models</a></div>
<header class="app">
  <svg class="logo-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10c.7.7 1 1.3 1 2h6c0-.7.3-1.3 1-2a6 6 0 0 0-4-10Z"/>
  </svg>
  <div class="brand">
    <h1>Estate</h1>
    <div class="subtitle">Technology Report <span class="crumb">/</span> Generator</div>
  </div>
  <span id="tokenWarn">⚠ ASANA_PAT not set — see .env</span>
  <div class="view-toggle" role="tablist" aria-label="Switch view">
    <button id="viewEdit" type="button" class="active" aria-selected="true">Edit</button>
    <button id="viewPreview" type="button" aria-selected="false">Preview</button>
  </div>
</header>

<div class="layout">
  <div class="pane form">
    <div class="card">
      <h2>Visit</h2>
      <div class="grid2">
        <div><label class="field">Region</label><select id="region"></select></div>
        <div><label class="field">Principal (Prepared for)</label><select id="principal"></select></div>
        <div><label class="field">Property code</label><input type="text" id="propertyCode" placeholder="auto-filled from tasks" /></div>
        <div><label class="field">Prepared by</label><input type="text" id="preparedBy" value="Chris Gachot" /></div>
        <div><label class="field">Visit start</label><input type="date" id="start" /></div>
        <div><label class="field">Visit end</label><input type="date" id="end" /></div>
        <div><label class="field">Date prepared</label><input type="date" id="datePrepared" /></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button id="pull">Pull from Asana</button>
        <button class="ghost" id="refreshMeta" title="Reload region/principal lists">↻</button>
      </div>
      <div class="status" id="pullStatus"></div>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <textarea id="summary" placeholder="Pull tasks to generate a baseline, then edit. Plain English, no em dashes."></textarea>
      <div class="row" style="margin-top:8px"><button class="ghost" id="draftSummary">Draft from tasks</button></div>
    </div>

    <div class="card" id="workCard" style="display:none">
      <h2>Work performed</h2>
      <div class="row" style="justify-content:space-between">
        <div class="checkline"><label><input type="checkbox" id="showNoise" /> show suppressed items</label></div>
        <button class="ghost" id="enhanceWork" title="Rewrite included bullets with Claude">✨ Enhance bullets</button>
      </div>
      <div id="workList" style="margin-top:8px"></div>
    </div>

    <div class="card" id="followupCard" style="display:none">
      <h2>Followup</h2>
      <div class="row" style="justify-content:flex-end">
        <button class="ghost" id="enhanceFollowup" title="Rewrite included follow-up items with Claude">✨ Enhance bullets</button>
      </div>
      <div id="followupList" style="margin-top:8px"></div>
    </div>

    <div class="card">
      <h2>Photos</h2>
      <div class="row">
        <input type="text" id="photosDir" placeholder="/path/to/photos" />
        <button class="ghost" id="loadPhotos">Load</button>
      </div>
      <div class="hint" id="photosHint"></div>
      <div id="photoList" style="margin-top:10px"></div>
    </div>

    <div class="actions">
      <button id="export">Export PDF</button>
      <button class="ghost" id="manualPreview">Refresh preview</button>
      <span class="status" id="exportStatus" style="margin-top:0"></span>
    </div>
    <div class="status" id="fitWarn" style="color:var(--gold)"></div>
  </div>

  <div class="pane preview">
    <div class="preview-stage"><iframe id="preview" title="Report preview"></iframe></div>
  </div>
</div>


<script>
'use strict';

const $ = (id) => document.getElementById(id);
const state = {
  sections: [],
  did: [],       // { include, section, text, name, category, performedBy, principalRequest, completedAt, noise }
  followup: [],  // { include, text, name, dueOn, ... }
  photos: [],    // { path, name, include, caption, placement }
};

// ---------- date helpers ----------
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  return `${MONTHS[m - 1]} ${d}, ${y}`;
}
function fmtRange(startIso, endIso) {
  if (!startIso) return '';
  if (!endIso || startIso === endIso) return fmtDate(startIso);
  const [sy, sm, sd] = startIso.split('-').map(Number);
  const [ey, em, ed] = endIso.split('-').map(Number);
  if (sy === ey && sm === em) return `${MONTHS[sm - 1]} ${sd}–${ed}, ${sy}`;
  if (sy === ey) return `${MONTHS[sm - 1]} ${sd} – ${MONTHS[em - 1]} ${ed}, ${sy}`;
  return `${fmtDate(startIso)} – ${fmtDate(endIso)}`;
}
function todayIso() { return new Date().toISOString().slice(0, 10); }

// ---------- init ----------
async function init() {
  const cfg = await (await fetch('/api/config')).json();
  $('photosDir').value = cfg.photosDir || '';
  state.sections = cfg.sections || [];
  if (!cfg.hasToken) $('tokenWarn').style.display = 'inline-block';
  if (!cfg.hasAnthropic) {
    ['enhanceWork', 'enhanceFollowup'].forEach((id) => {
      $(id).disabled = true;
      $(id).title = 'Set ANTHROPIC_API_KEY in .env to enable';
    });
  }
  $('datePrepared').value = todayIso();
  await loadMeta();
  bind();
  schedulePreview();
}

async function loadMeta() {
  try {
    const meta = await (await fetch('/api/meta')).json();
    if (meta.error) throw new Error(meta.error);
    state.sections = meta.sections || state.sections;
    fillSelect($('region'), meta.regions || []);
    fillSelect($('principal'), meta.principals || []);
    // sensible defaults
    selectIfPresent($('region'), 'Coastal');
    selectIfPresent($('principal'), 'The Hartley Family');
  } catch (e) {
    setStatus('pullStatus', 'Could not load Asana field lists: ' + e.message, 'err');
  }
}
function fillSelect(sel, items) {
  sel.innerHTML = '<option value=""></option>' + items.map((i) => `<option>${escapeHtml(i)}</option>`).join('');
}
function selectIfPresent(sel, val) {
  if ([...sel.options].some((o) => o.value === val)) sel.value = val;
}

// ---------- bindings ----------
function bind() {
  $('pull').onclick = pullAsana;
  $('refreshMeta').onclick = loadMeta;
  $('loadPhotos').onclick = loadPhotos;
  $('export').onclick = exportPdf;
  $('manualPreview').onclick = renderPreview;
  $('showNoise').onchange = renderWork;
  $('draftSummary').onclick = () => { $('summary').value = buildBaselineSummary(); schedulePreview(); };
  $('enhanceWork').onclick = () => enhanceList('work');
  $('enhanceFollowup').onclick = () => enhanceList('followup');
  ['summary', 'region', 'principal', 'propertyCode', 'preparedBy', 'start', 'end', 'datePrepared'].forEach((id) => {
    $(id).addEventListener('input', schedulePreview);
    $(id).addEventListener('change', schedulePreview);
  });
  $('viewEdit').onclick = () => setMobileView('edit');
  $('viewPreview').onclick = () => setMobileView('preview');
}

// Mobile-only: swap between the form and the full-screen preview. Re-renders
// the report on switch so the preview reflects the latest edits. No effect on
// desktop, where both panes are always visible.
function setMobileView(view) {
  const preview = view === 'preview';
  document.body.classList.toggle('show-preview', preview);
  $('viewEdit').classList.toggle('active', !preview);
  $('viewPreview').classList.toggle('active', preview);
  $('viewEdit').setAttribute('aria-selected', String(!preview));
  $('viewPreview').setAttribute('aria-selected', String(preview));
  if (preview) renderPreview();
}

// Mobile-only: the report is a fixed 816px (8.5in) wide page. Scale the iframe
// down so the whole page fits the phone screen, and size its stage wrapper to
// the scaled box so there's no horizontal overflow. No-op (and resets) on desktop.
var PAGE_W = 816, PAGE_H = 1056;  // 8.5in x 11in at 96dpi
function fitPreview() {
  const frame = $('preview');
  const stage = frame.parentElement;
  if (!window.matchMedia('(max-width: 860px)').matches) {
    frame.style.cssText = '';
    stage.style.cssText = '';
    return;
  }
  const pane = frame.closest('.pane.preview');
  const avail = pane.clientWidth - 28;  // 14px padding each side
  const scale = Math.min(1, avail / PAGE_W);
  frame.style.width = PAGE_W + 'px';
  frame.style.height = PAGE_H + 'px';
  frame.style.transform = `scale(${scale})`;
  stage.style.width = Math.round(PAGE_W * scale) + 'px';
  stage.style.height = Math.round(PAGE_H * scale) + 'px';
}
window.addEventListener('resize', fitPreview);

// ---------- Asana pull ----------
async function pullAsana() {
  const region = $('region').value, principal = $('principal').value;
  const start = $('start').value, end = $('end').value;
  if (!start || !end) return setStatus('pullStatus', 'Enter visit start and end dates first.', 'err');
  setStatus('pullStatus', 'Pulling from Asana…');
  $('pull').disabled = true;
  try {
    const q = new URLSearchParams({ region, principal, start, end });
    const data = await (await fetch('/api/tasks?' + q)).json();
    if (data.error) throw new Error(data.error);
    state.did = (data.did || []).map((t) => ({ ...t, text: t.displayText }));
    state.followup = (data.followup || []).map((t) => ({ ...t, text: t.displayText }));
    renderWork();
    renderFollowup();
    autoFillPropertyCode();
    if (!$('summary').value.trim()) $('summary').value = buildBaselineSummary();
    const realDid = state.did.filter((t) => !t.noise).length;
    setStatus('pullStatus', `Pulled ${realDid} work items and ${state.followup.length} followup items (window ${data.window.start} → ${data.window.end}).`, 'ok');
    schedulePreview();
  } catch (e) {
    setStatus('pullStatus', 'Error: ' + e.message, 'err');
  } finally {
    $('pull').disabled = false;
  }
}

function renderWork() {
  const showNoise = $('showNoise').checked;
  const card = $('workCard');
  const list = $('workList');
  const items = state.did.filter((t) => showNoise || !t.noise);
  card.style.display = state.did.length ? 'block' : 'none';
  list.innerHTML = '';
  // group by section for readability
  const order = [...state.sections, 'Other'];
  const groups = {};
  items.forEach((t) => { (groups[t.section] ||= []).push(t); });
  const names = [...new Set([...order.filter((s) => groups[s]), ...Object.keys(groups)])];
  names.forEach((name) => {
    const hdr = document.createElement('div');
    hdr.className = 'grouphdr';
    hdr.textContent = name;
    list.appendChild(hdr);
    groups[name].forEach((t) => list.appendChild(taskRow(t)));
  });
}

function taskRow(t) {
  const idx = state.did.indexOf(t);
  const el = document.createElement('div');
  el.className = 'task' + (t.include ? '' : ' off');
  const sectionOpts = [...state.sections]
    .map((s) => `<option ${s === t.section ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
  const vendor = t.performedBy && !/self-performed/i.test(t.performedBy);
  el.innerHTML = `
    <div class="top">
      <input type="checkbox" ${t.include ? 'checked' : ''} data-k="include" />
      <select class="section" data-k="section">${sectionOpts}</select>
      <input type="text" class="txt" data-k="text" value="${escapeHtml(t.text)}" />
    </div>
    <div class="meta">
      ${t.category ? `<span class="badge">${escapeHtml(t.category)}</span>` : ''}
      ${vendor ? `<span class="badge vendor">${escapeHtml(t.performedBy)}</span>` : ''}
      ${t.principalRequest ? `<span class="badge req">principal request</span>` : ''}
      ${t.completedAt ? `completed ${t.completedAt.slice(0, 10)}` : ''}
      ${t.noise ? `· <em>suppressed</em>` : ''}
    </div>`;
  el.querySelector('[data-k=include]').onchange = (e) => { t.include = e.target.checked; el.classList.toggle('off', !t.include); schedulePreview(); };
  el.querySelector('[data-k=section]').onchange = (e) => { t.section = e.target.value; schedulePreview(); };
  el.querySelector('[data-k=text]').oninput = (e) => { t.text = e.target.value; schedulePreview(); };
  return el;
}

function renderFollowup() {
  const card = $('followupCard');
  const list = $('followupList');
  card.style.display = state.followup.length ? 'block' : 'none';
  list.innerHTML = '';
  state.followup.forEach((t) => {
    const el = document.createElement('div');
    el.className = 'task' + (t.include ? '' : ' off');
    el.innerHTML = `
      <div class="top">
        <input type="checkbox" ${t.include ? 'checked' : ''} data-k="include" />
        <input type="text" class="txt" data-k="text" value="${escapeHtml(t.text)}" />
      </div>
      <div class="meta">
        ${t.dueOn ? `due ${t.dueOn}` : 'no due date'}
        ${t.propertyCode ? `· ${escapeHtml(t.propertyCode)}` : ''}
        ${t.principalRequest ? `<span class="badge req">principal request</span>` : ''}
      </div>`;
    el.querySelector('[data-k=include]').onchange = (e) => { t.include = e.target.checked; el.classList.toggle('off', !t.include); schedulePreview(); };
    el.querySelector('[data-k=text]').oninput = (e) => { t.text = e.target.value; schedulePreview(); };
    list.appendChild(el);
  });
}

// ---------- photos ----------
async function loadPhotos() {
  const dir = $('photosDir').value.trim();
  setStatus('photosHint', 'Loading…');
  try {
    const data = await (await fetch('/api/photos?dir=' + encodeURIComponent(dir))).json();
    if (data.error) throw new Error(data.error);
    state.photos = (data.files || []).map((f) => ({
      path: f.path, name: f.name, include: false, caption: '', placement: 'Appendix',
    }));
    $('photosHint').textContent = data.files.length
      ? `${data.files.length} image(s) in ${data.dir}`
      : (data.note || `No images found in ${data.dir}`);
    renderPhotos();
  } catch (e) {
    setStatus('photosHint', 'Error: ' + e.message, 'err');
  }
}

function renderPhotos() {
  const list = $('photoList');
  list.innerHTML = '';
  const placements = ['Appendix', ...state.sections];
  state.photos.forEach((p) => {
    const el = document.createElement('div');
    el.className = 'photo-item' + (p.include ? '' : ' off');
    const opts = placements.map((s) => `<option ${s === p.placement ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
    el.innerHTML = `
      <img src="/api/photo/raw?path=${encodeURIComponent(p.path)}" loading="lazy" />
      <div class="pcontrols">
        <div class="checkline"><label><input type="checkbox" data-k="include" ${p.include ? 'checked' : ''}/> include</label>
          <select data-k="placement" class="section">${opts}</select></div>
        <input type="text" data-k="caption" placeholder="Caption (optional)" value="${escapeHtml(p.caption)}" />
        <div class="meta" style="font-size:10.5px;color:#9aa">${escapeHtml(p.name)}</div>
      </div>`;
    el.querySelector('[data-k=include]').onchange = (e) => { p.include = e.target.checked; el.classList.toggle('off', !p.include); schedulePreview(); };
    el.querySelector('[data-k=placement]').onchange = (e) => { p.placement = e.target.value; schedulePreview(); };
    el.querySelector('[data-k=caption]').oninput = (e) => { p.caption = e.target.value; schedulePreview(); };
    list.appendChild(el);
  });
}

// ---------- model + preview + export ----------
function buildModel() {
  const includedDid = state.did.filter((t) => t.include && t.text.trim());
  const bySection = {};
  includedDid.forEach((t) => { (bySection[t.section] ||= []).push(t.text.trim()); });
  const sections = Object.keys(bySection).map((name) => ({ name, bullets: bySection[name] }));

  const followup = state.followup.filter((t) => t.include && t.text.trim()).map((t) => t.text.trim());
  const photos = state.photos.filter((p) => p.include).map((p) => ({ path: p.path, caption: p.caption, placement: p.placement }));

  return {
    region: $('region').value,
    propertyCode: $('propertyCode').value.trim(),
    preparedFor: $('principal').value,
    preparedBy: $('preparedBy').value,
    visitDates: fmtRange($('start').value, $('end').value),
    datePrepared: fmtDate($('datePrepared').value),
    datePreparedISO: $('datePrepared').value,
    summary: $('summary').value,
    sections,
    followup,
    photos,
  };
}

// Auto-fill the property code with the most common code among the included
// work items (editable afterwards). Leaves a user-entered value untouched.
function autoFillPropertyCode() {
  if ($('propertyCode').value.trim()) return;
  const counts = {};
  state.did.filter((t) => !t.noise && t.include).forEach((t) => {
    if (t.propertyCode) counts[t.propertyCode] = (counts[t.propertyCode] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
  if (top) $('propertyCode').value = top[0];
}

// Build an editable baseline summary from the included work items.
function buildBaselineSummary() {
  const region = $('region').value || 'the property';
  const dates = fmtRange($('start').value, $('end').value);
  const items = state.did.filter((t) => t.include && !t.noise && t.text.trim()).map((t) => t.text.trim());
  const on = dates ? ' on ' + dates : '';
  if (!items.length) return `The team was in ${region}${on}.`;
  const lead = items.slice(0, 4).map(lcFirst);
  const more = items.length > 4 ? ', among other work' : '';
  const fu = state.followup.filter((t) => t.include && t.text.trim()).length;
  let s = `The team was in ${region}${on} to ${humanList(lead)}${more}.`;
  if (fu) s += ` ${fu} item${fu > 1 ? 's' : ''} remain${fu > 1 ? '' : 's'} for followup.`;
  return s;
}
function lcFirst(s) {
  if (/^[A-Z0-9]{2,}/.test(s)) return s; // leave acronyms / codes (NVR, AV, BR77)
  return s.charAt(0).toLowerCase() + s.slice(1);
}
function humanList(arr) {
  if (arr.length === 1) return arr[0];
  if (arr.length === 2) return arr[0] + ' and ' + arr[1];
  return arr.slice(0, -1).join(', ') + ', and ' + arr[arr.length - 1];
}

// Rewrite the included bullets (work or followup) into polished one-liners via Claude.
async function enhanceList(kind) {
  const btn = kind === 'followup' ? $('enhanceFollowup') : $('enhanceWork');
  const refs = (kind === 'followup' ? state.followup : state.did)
    .filter((t) => t.include && (kind === 'followup' || !t.noise) && t.text.trim());
  if (!refs.length) { setStatus('exportStatus', 'Nothing to enhance — include some items first.', 'err'); return; }
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = 'Enhancing…';
  setStatus('exportStatus', `Rewriting ${refs.length} ${kind} bullet${refs.length > 1 ? 's' : ''}…`);
  try {
    const res = await fetch('/api/enhance', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        kind,
        region: $('region').value,
        principal: $('principal').value,
        propertyCode: $('propertyCode').value.trim(),
        items: refs.map((t) => ({ text: t.text.trim(), section: t.section || '' })),
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    (data.bullets || []).forEach((b, i) => { if (refs[i] && b) refs[i].text = b; });
    if (kind === 'followup') renderFollowup(); else renderWork();
    setStatus('exportStatus', `Enhanced ${refs.length} ${kind} bullet${refs.length > 1 ? 's' : ''}.`, 'ok');
    schedulePreview();
  } catch (e) {
    setStatus('exportStatus', 'Enhance error: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = label;
  }
}

let previewTimer = null;
function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 350);
}
async function renderPreview() {
  try {
    const res = await fetch('/api/preview', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(buildModel()),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const frame = $('preview');
    frame.onload = () => { fitPreview(); checkFitState(frame); };
    frame.srcdoc = data.html;
  } catch (e) {
    setStatus('exportStatus', 'Preview error: ' + e.message, 'err');
  }
}

// Read the one-page fit result from the preview iframe and warn if it still
// overflows even at minimum spacing/photo/font scale (content would be clipped).
function checkFitState(frame, tries) {
  tries = tries || 0;
  let st;
  try { st = frame.contentWindow && frame.contentWindow.__fitState; } catch (e) { st = null; }
  if (!st) {
    if (tries < 12) setTimeout(() => checkFitState(frame, tries + 1), 80);
    return;
  }
  $('fitWarn').textContent = st.overflowing
    ? '⚠ Content exceeds one page even at minimum spacing. Trim bullets, shorten the summary, or remove a photo.'
    : '';
}

async function exportPdf() {
  setStatus('exportStatus', 'Rendering PDF…');
  $('export').disabled = true;
  try {
    const res = await fetch('/api/render', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(buildModel()),
    });
    if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || res.statusText); }
    const savedPath = res.headers.get('X-Saved-Path');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (savedPath || 'report.pdf').split('/').pop();
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setStatus('exportStatus', 'Saved to ' + savedPath, 'ok');
  } catch (e) {
    setStatus('exportStatus', 'Export error: ' + e.message, 'err');
  } finally {
    $('export').disabled = false;
  }
}

// ---------- util ----------
function setStatus(id, msg, kind) {
  const el = $(id);
  el.textContent = msg;
  el.className = 'status' + (kind ? ' ' + kind : '');
  if (id === 'photosHint') el.className = 'hint' + (kind === 'err' ? ' err' : '');
}
function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

init();

 function ready(){var r=document.getElementById('region');if(!r||!r.options.length){return setTimeout(ready,120);}
  var end=new Date(),start=new Date();start.setDate(end.getDate()-9);
  document.getElementById('start').value=iso(start);document.getElementById('end').value=iso(end);

  var ex=document.getElementById('export');

 setTimeout(ready,300);})();
</script>
